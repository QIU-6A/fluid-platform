<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>流体力学实验数据处理 & 流变曲线分析</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --bg: #f0f4f8;
            --card-bg: #ffffff;
            --primary: #1a73e8;
            --primary-dark: #1557b0;
            --accent: #ff7f0e;
            --accent-dark: #d96c0a;
            --text: #2c3e50;
            --text-light: #5a6c7d;
            --border: #e2e8f0;
            --shadow: 0 2px 12px rgba(0,0,0,0.07);
            --radius: 12px;
            --radius-sm: 8px;
            --transition: 0.25s;
            --font-mono: 'SF Mono','Cascadia Code','Consolas','Monaco',monospace;
            --danger: #e53e3e;
            --success: #38a169;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg); color: var(--text); line-height:1.6; min-height:100vh; padding-bottom:40px;
        }
        .app-header {
            background: linear-gradient(135deg, #1a3a5c 0%, #1a5276 40%, #1a6daa 100%);
            color:#fff; padding:16px 24px; box-shadow:0 4px 20px rgba(0,0,0,0.15);
            position:sticky; top:0; z-index:100; display:flex; align-items:center; justify-content:space-between;
            flex-wrap:wrap; gap:12px;
        }
        .app-header .logo { display:flex; align-items:center; gap:10px; font-size:1.25rem; font-weight:700; }
        .app-header .version { font-size:0.78rem; opacity:0.75; }
        .container { max-width:1300px; margin:0 auto; padding:20px 16px; }
        .mode-tabs { display:flex; gap:4px; background:#e8edf2; border-radius:28px; padding:4px; margin-bottom:20px; width:fit-content; }
        .mode-tab {
            padding:10px 22px; border-radius:24px; cursor:pointer; font-weight:600; font-size:0.95rem;
            border:none; background:transparent; color:var(--text-light); transition:var(--transition); white-space:nowrap;
        }
        .mode-tab.active { background:#fff; color:var(--primary); box-shadow:0 2px 8px rgba(0,0,0,0.10); }
        .card {
            background:var(--card-bg); border-radius:var(--radius); box-shadow:var(--shadow);
            padding:20px 22px; margin-bottom:18px; border:1px solid var(--border);
        }
        .card-header { font-weight:700; font-size:1.05rem; margin-bottom:14px; display:flex; align-items:center; gap:8px; }
        .badge-blue { background:#e8f0fe; color:#1a6daa; padding:3px 10px; border-radius:14px; font-size:0.75rem; font-weight:600; }
        .badge-orange { background:#fff3e6; color:#c75b0a; padding:3px 10px; border-radius:14px; font-size:0.75rem; font-weight:600; }
        .charts-wrapper { display:flex; gap:18px; flex-wrap:wrap; }
        .chart-container {
            flex:1; min-width:340px; background:#fff; border-radius:var(--radius); padding:14px 16px;
            box-shadow:var(--shadow); border:1px solid var(--border); position:relative; transition:var(--transition);
        }
        .chart-container.collapsed {
            max-height:0; overflow:hidden; padding:0 16px; margin:0; border-width:0; opacity:0;
            pointer-events:none; min-width:0; flex:0;
        }
        .chart-container canvas { max-height:380px; }
        .chart-toggle-btn {
            position:absolute; top:10px; right:14px; z-index:5; background:#f7fafc; border:1px solid #ddd;
            border-radius:50%; width:32px; height:32px; cursor:pointer; font-size:1rem;
            display:flex; align-items:center; justify-content:center; transition:var(--transition); color:#666;
        }
        .chart-toggle-btn:hover { background:#e2e8f0; color:#333; }
        .btn {
            display:inline-flex; align-items:center; gap:6px; padding:9px 16px; border-radius:var(--radius-sm);
            font-weight:600; font-size:0.9rem; cursor:pointer; border:none; transition:var(--transition);
            white-space:nowrap; font-family:inherit;
        }
        .btn-primary { background:var(--primary); color:#fff; }
        .btn-primary:hover { background:var(--primary-dark); transform:translateY(-1px); box-shadow:0 4px 14px rgba(26,115,232,0.3); }
        .btn-accent { background:var(--accent); color:#fff; }
        .btn-accent:hover { background:var(--accent-dark); transform:translateY(-1px); box-shadow:0 4px 14px rgba(255,127,14,0.3); }
        .btn-outline { background:#fff; color:var(--text); border:1.5px solid #d0d7de; }
        .btn-outline:hover { border-color:#a0aab4; background:#f9fafb; }
        .btn-danger { background:#fff; color:var(--danger); border:1.5px solid #fecaca; }
        .btn-danger:hover { background:#fef2f2; border-color:var(--danger); color:#c53030; }
        .btn-sm { padding:5px 10px; font-size:0.78rem; border-radius:6px; }
        .btn-group { display:flex; flex-wrap:wrap; gap:8px; }
        .form-row { display:flex; flex-wrap:wrap; gap:10px; align-items:flex-end; margin-bottom:12px; }
        .form-group { display:flex; flex-direction:column; gap:4px; }
        .form-group label { font-size:0.82rem; font-weight:600; color:var(--text-light); letter-spacing:0.3px; }
        .form-input {
            padding:9px 13px; border:1.5px solid #d0d7de; border-radius:var(--radius-sm);
            font-size:0.92rem; font-family:var(--font-mono); width:140px; background:#fafbfc; color:var(--text);
        }
        .form-input:focus { outline:none; border-color:var(--primary); box-shadow:0 0 0 3px rgba(26,115,232,0.1); background:#fff; }
        textarea.form-input { width:100%; min-width:300px; resize:vertical; }
        .table-wrapper { overflow-x:auto; border-radius:var(--radius-sm); border:1px solid var(--border); }
        table { width:100%; border-collapse:collapse; font-size:0.88rem; min-width:600px; }
        table thead th {
            background:#f7f9fb; padding:11px 10px; text-align:center; font-weight:700;
            color:var(--text); border-bottom:2px solid #dde4ed; white-space:nowrap; font-size:0.82rem;
        }
        table tbody td {
            padding:9px 10px; text-align:center; border-bottom:1px solid #f0f3f6;
            font-family:var(--font-mono); font-size:0.84rem; color:#3d4f5f;
        }
        table tbody tr:hover { background:#f8fafc; }
        .del-cell { cursor:pointer; color:#cbd5e0; font-weight:700; font-size:1.1rem; user-select:none; }
        .del-cell:hover { color:var(--danger); transform:scale(1.2); }
        .empty-table { text-align:center; padding:28px; color:#a0aec0; font-style:italic; }
        .results-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:10px; margin-top:10px; }
        .result-item { background:#f7f9fb; border-radius:var(--radius-sm); padding:12px 14px; text-align:center; border:1px solid #e8edf2; }
        .result-item .val { font-size:1.3rem; font-weight:700; color:var(--primary); }
        .result-item .val.accent { color:var(--accent); }
        .result-item .lbl { font-size:0.75rem; color:var(--text-light); margin-top:2px; }
        .fluid-type-badge { display:inline-block; padding:8px 16px; border-radius:20px; font-weight:700; font-size:0.95rem; margin-top:8px; }
        .pseudoplastic { background:#fef3c7; color:#92400e; }
        .newtonian { background:#dbeafe; color:#1e40af; }
        .bingham { background:#fce7f3; color:#9d174d; }
        .dilatant { background:#d1fae5; color:#065f46; }
        .toast {
            position:fixed; bottom:30px; right:30px; background:#2c3e50; color:#fff; padding:12px 20px;
            border-radius:24px; font-weight:600; z-index:999; opacity:0; transform:translateY(20px);
            transition:var(--transition); pointer-events:none; box-shadow:0 6px 20px rgba(0,0,0,0.2);
        }
        .toast.show { opacity:1; transform:translateY(0); }
        .toast.success { background:#38a169; }
        .toast.error { background:#e53e3e; }
        @media (max-width:768px) {
            .charts-wrapper { flex-direction:column; }
            .chart-container { min-width:100%; }
            .form-row { flex-direction:column; align-items:stretch; }
            .form-input { width:100%; }
            .btn-group { flex-direction:column; }
            .btn { justify-content:center; }
        }
    </style>
</head>
<body>
    <header class="app-header">
        <div class="logo"><span>🔬 流体实验数据平台</span><span class="version">v2.6</span></div>
        <div class="mode-tabs">
            <button class="mode-tab active" id="tabMode1">📐 流体力学实验</button>
            <button class="mode-tab" id="tabMode2">🧪 流变曲线分析</button>
        </div>
    </header>

    <div class="container">
        <!-- 图表区域 -->
        <div id="mainCharts" class="charts-wrapper">
            <div class="chart-container" id="chartContainer1">
                <button class="chart-toggle-btn" onclick="toggleCharts()">▾</button>
                <canvas id="chartQdh"></canvas>
            </div>
            <div class="chart-container" id="chartContainer2">
                <canvas id="chartReMu"></canvas>
            </div>
        </div>
        <div id="rheoCharts" class="charts-wrapper" style="display:none;">
            <div class="chart-container" id="chartContainerRheo">
                <button class="chart-toggle-btn" onclick="toggleCharts()">▾</button>
                <canvas id="chartRheo"></canvas>
            </div>
        </div>

        <!-- 流体力学实验面板 -->
        <div id="mainPanel">
            <div class="card">
                <div class="card-header"><span class="badge-blue">操作</span>流体力学实验</div>
                <div class="btn-group">
                    <button class="btn btn-primary" onclick="scrollToAddForm()">➕ 新增数据</button>
                    <button class="btn btn-outline" onclick="exportMainTable()">📤 导出数据表</button>
                    <button class="btn btn-outline" onclick="triggerImportMain()">📥 导入（TXT/xlsx/CSV）</button>
                    <button class="btn btn-outline" onclick="toggleCharts()">👁️ 切换图表</button>
                    <button class="btn btn-outline" onclick="exportChartJPEG('sidebyside')">🖼️ 导出图表(左右)</button>
                    <button class="btn btn-outline" onclick="exportChartJPEG('stacked')">🖼️ 导出图表(上下)</button>
                    <button class="btn btn-danger btn-sm" onclick="resetMainData()">🗑️ 清空数据</button>
                </div>
                <input type="file" id="importFileMain" accept=".txt,.csv,.xlsx" style="display:none" onchange="handleImportMain(event)">
            </div>

            <div class="card">
                <div class="card-header"><span class="badge-blue">设置</span>实验参数（修改后自动重算全部数据）</div>
                <div class="form-row">
                    <div class="form-group"><label>K (cm²·⁵/s)</label><input type="number" class="form-input" id="paramK" value="18.14" step="any" min="0.01"></div>
                    <div class="form-group"><label>d (cm)</label><input type="number" class="form-input" id="paramD" value="0.695" step="any" min="0.001"></div>
                    <div class="form-group"><label>ν (cm²/s)</label><input type="number" class="form-input" id="paramNu" value="0.008" step="any" min="0.0001"></div>
                    <button class="btn btn-primary" onclick="applyParams()">✅ 应用修改</button>
                    <button class="btn btn-outline btn-sm" onclick="resetParamsDefault()">↺ 重置默认值</button>
                </div>
            </div>

            <div class="card" id="addDataCard">
                <div class="card-header"><span class="badge-blue">录入</span>新增实验数据</div>
                <div class="form-row">
                    <div class="form-group"><label>Q (cm³/s)</label><input type="number" class="form-input" id="inputQ" step="any"></div>
                    <div class="form-group"><label>Δh (cm)</label><input type="number" class="form-input" id="inputDh" step="any" min="0.01"></div>
                    <button class="btn btn-primary" onclick="addMainData()">✅ 添加单条</button>
                </div>
                <details style="margin-top:8px;">
                    <summary style="cursor:pointer;font-weight:600;">📝 批量粘贴（每行：Q Δh）</summary>
                    <textarea class="form-input" id="batchMainInput" rows="4" placeholder="100 50&#10;200 80"></textarea>
                    <button class="btn btn-accent btn-sm" style="margin-top:6px;" onclick="batchAddMain()">批量添加</button>
                </details>
            </div>

            <div class="card">
                <div class="card-header" id="mainTableHeader"><span class="badge-blue">数据表</span>K=18.14 cm²·⁵/s | d=0.695 cm | ν=0.008 cm²/s</div>
                <div class="table-wrapper">
                    <table id="mainTable">
                        <thead><tr><th>次序</th><th>Q (cm³/s)</th><th>Δh (cm)</th><th>Reₑₗ</th><th>Q' (cm³/s)</th><th>μ</th><th>操作</th></tr></thead>
                        <tbody id="mainTableBody"><tr><td colspan="7" class="empty-table">暂无实验数据</td></tr></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- 流变曲线分析面板 -->
        <div id="rheoPanel" style="display:none;">
            <div class="card">
                <div class="card-header"><span class="badge-orange">操作</span>流变曲线分析</div>
                <div class="btn-group">
                    <button class="btn btn-accent" onclick="scrollToRheoAddForm()">➕ 添加流变数据</button>
                    <button class="btn btn-outline" onclick="exportRheoTable()">📤 导出数据表</button>
                    <button class="btn btn-outline" onclick="calcRheoParams()">🔬 计算流变参数</button>
                    <button class="btn btn-outline" onclick="triggerImportRheo()">📥 导入（TXT/xlsx/CSV）</button>
                    <button class="btn btn-outline" onclick="toggleCharts()">👁️ 切换图表</button>
                    <button class="btn btn-outline" onclick="exportChartJPEG('single')">🖼️ 导出图表</button>
                    <button class="btn btn-danger btn-sm" onclick="resetRheoData()">🗑️ 清空数据</button>
                </div>
                <input type="file" id="importFileRheo" accept=".txt,.csv,.xlsx" style="display:none" onchange="handleImportRheo(event)">
            </div>

            <div class="card" id="addRheoDataCard">
                <div class="card-header"><span class="badge-orange">录入</span>添加流变数据（转速 & 读数）</div>
                <div class="form-row">
                    <div class="form-group"><label>转速 (rpm)</label><input type="number" class="form-input" id="inputRpm" step="any" min="0.01"></div>
                    <div class="form-group"><label>读数 (格)</label><input type="number" class="form-input" id="inputTheta" step="any" min="0"></div>
                    <button class="btn btn-accent" onclick="addRheoData()">✅ 添加单条</button>
                </div>
                <details style="margin-top:8px;">
                    <summary style="cursor:pointer;font-weight:600;">📝 批量粘贴（每行：转速 读数）</summary>
                    <textarea class="form-input" id="batchRheoInput" rows="4" placeholder="600 50&#10;300 30"></textarea>
                    <button class="btn btn-accent btn-sm" style="margin-top:6px;" onclick="batchAddRheo()">批量添加</button>
                </details>
            </div>

            <div class="card">
                <div class="card-header"><span class="badge-orange">设置</span>剪切力读数 φ₃</div>
                <div class="form-row">
                    <div class="form-group"><label>φ₃ (1 min)</label><input type="number" class="form-input" id="inputPhi3_1min" placeholder="可选" step="any"></div>
                    <div class="form-group"><label>φ₃ (10 min)</label><input type="number" class="form-input" id="inputPhi3_10min" placeholder="可选" step="any"></div>
                    <button class="btn btn-outline btn-sm" onclick="updatePhi3()">💾 保存剪切力</button>
                </div>
            </div>

            <div class="card">
                <div class="card-header"><span class="badge-orange">数据表</span>γ=1.703×rpm | τ=0.511×θ</div>
                <div class="table-wrapper">
                    <table id="rheoTable">
                        <thead><tr><th>序号</th><th>转速 (rpm)</th><th>读数 (格)</th><th>γ (s⁻¹)</th><th>τ (Pa)</th><th>操作</th></tr></thead>
                        <tbody id="rheoTableBody"><tr><td colspan="6" class="empty-table">暂无流变数据</td></tr></tbody>
                    </table>
                </div>
            </div>

            <div class="card" id="rheoResultsCard" style="display:none;">
                <div class="card-header"><span class="badge-orange">结果</span>流变参数计算结果</div>
                <div class="results-grid" id="rheoResultsGrid"></div>
                <div id="fluidTypeResult" style="margin-top:8px;"></div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // 全局参数
        let K = 18.14, d_cm = 0.695, nu = 0.008;
        let currentMode = 1;
        let seqList = [], QList = [], dhList = [], QPrimeList = [], muList = [], ReList = [];
        let rpmList = [], thetaList = [], gammaList = [], tauList = [], phi3_1min = null, phi3_10min = null;
        let chartQdh = null, chartReMu = null, chartRheo = null, chartsVisible = true;

        function showToast(msg, type = '') {
            const t = document.getElementById('toast');
            t.textContent = msg; t.className = 'toast ' + type + ' show';
            clearTimeout(t._timeout); t._timeout = setTimeout(() => t.classList.remove('show'), 2200);
        }

        function calcRe(Q) { return +((4 * Q) / (Math.PI * d_cm * nu)).toFixed(2); }
        function calcAllParam(Q, dh) {
            if (dh <= 0) throw new Error('Δh>0');
            const Qp = +(K * Math.sqrt(dh)).toFixed(2);
            return { QPrime: Qp, mu: +(Q / Qp).toFixed(4), Re: calcRe(Q) };
        }

        function recalcAllMainData() {
            for (let i = 0; i < seqList.length; i++) {
                const p = calcAllParam(QList[i], dhList[i]);
                QPrimeList[i] = p.QPrime; muList[i] = p.mu; ReList[i] = p.Re;
            }
            updateMainTableUI(); refreshAllCharts();
        }

        function applyParams() {
            const kv = +document.getElementById('paramK').value;
            const dv = +document.getElementById('paramD').value;
            const nv = +document.getElementById('paramNu').value;
            if (isNaN(kv) || isNaN(dv) || isNaN(nv) || kv <= 0 || dv <= 0 || nv <= 0) return showToast('参数必须为正数','error');
            K = kv; d_cm = dv; nu = nv;
            document.getElementById('mainTableHeader').innerHTML = `<span class="badge-blue">数据表</span>K=${K} cm²·⁵/s | d=${d_cm} cm | ν=${nu} cm²/s`;
            recalcAllMainData(); showToast('参数已更新','success');
        }

        function resetParamsDefault() {
            document.getElementById('paramK').value = 18.14;
            document.getElementById('paramD').value = 0.695;
            document.getElementById('paramNu').value = 0.008;
            applyParams();
        }

        // 图表核心修复
        function safeDestroy(chart) { if (chart) chart.destroy(); }

        function createChartQdh() {
            safeDestroy(chartQdh);
            const canvas = document.getElementById('chartQdh');
            if (!canvas) return;
            chartQdh = new Chart(canvas, {
                type: 'line',
                data: { labels: dhList, datasets: [{ label: 'Q~Δh', data: QList, borderColor: '#1f77b4', pointRadius: 5, tension: 0 }] },
                options: { responsive: true, maintainAspectRatio: true, plugins: { title: { display: true, text: 'Q ∼ Δh' } }, scales: { x: { title: { display: true, text: 'Δh (cm)' } }, y: { title: { display: true, text: 'Q (cm³/s)' }, beginAtZero: true } } }
            });
        }

        function createChartReMu() {
            safeDestroy(chartReMu);
            const canvas = document.getElementById('chartReMu');
            if (!canvas) return;
            chartReMu = new Chart(canvas, {
                type: 'line',
                data: { labels: muList, datasets: [{ label: 'Re~μ', data: ReList, borderColor: '#ff7f0e', pointRadius: 5, tension: 0 }] },
                options: { responsive: true, maintainAspectRatio: true, plugins: { title: { display: true, text: 'Reₑₗ ∼ μ' } }, scales: { x: { title: { display: true, text: 'μ' } }, y: { title: { display: true, text: 'Reₑₗ' }, beginAtZero: true } } }
            });
        }

        function createChartRheo() {
            safeDestroy(chartRheo);
            const canvas = document.getElementById('chartRheo');
            if (!canvas) return;
            if (gammaList.length === 0) {
                chartRheo = new Chart(canvas, {
                    type: 'line', data: { labels: [], datasets: [] },
                    options: { responsive: true, plugins: { title: { display: true, text: 'τ ∼ γ̇ 流变曲线（暂无数据）' } }, scales: { x: { type: 'linear', title: { display: true, text: 'γ̇ (s⁻¹)' } }, y: { title: { display: true, text: 'τ (Pa)' }, beginAtZero: false, grace: '5%' } } }
                });
                return;
            }
            const idx = gammaList.map((_, i) => i).sort((a, b) => gammaList[a] - gammaList[b]);
            const gs = idx.map(i => gammaList[i]), ts = idx.map(i => tauList[i]);
            chartRheo = new Chart(canvas, {
                type: 'line',
                data: { datasets: [{ label: 'τ~γ', data: gs.map((x, i) => ({ x, y: ts[i] })), borderColor: '#1f77b4', backgroundColor: 'rgba(31,119,180,0.1)', pointRadius: 6, tension: 0.3, fill: false, parsing: { xAxisKey: 'x', yAxisKey: 'y' } }] },
                options: {
                    responsive: true, maintainAspectRatio: true,
                    plugins: { title: { display: true, text: 'τ ∼ γ̇ 流变曲线' }, legend: { display: true } },
                    scales: {
                        x: { type: 'linear', title: { display: true, text: 'γ̇ (s⁻¹)' }, grid: { color: '#e8edf2' } },
                        y: { title: { display: true, text: 'τ (Pa)' }, grid: { color: '#e8edf2' }, beginAtZero: false, grace: '5%' }
                    }
                }
            });
        }

        function refreshAllCharts() {
            if (currentMode === 1) { createChartQdh(); createChartReMu(); }
            else { createChartRheo(); }
        }

        function toggleCharts() {
            const c1 = document.getElementById('chartContainer1');
            const c2 = document.getElementById('chartContainer2');
            const cr = document.getElementById('chartContainerRheo');
            if (currentMode === 1) {
                if (chartsVisible) {
                    c1.classList.add('collapsed'); c2.classList.add('collapsed'); chartsVisible = false;
                } else {
                    c1.classList.remove('collapsed'); c2.classList.remove('collapsed'); chartsVisible = true;
                    setTimeout(refreshAllCharts, 150);
                }
            } else {
                if (chartsVisible) {
                    cr.classList.add('collapsed'); chartsVisible = false;
                } else {
                    cr.classList.remove('collapsed'); chartsVisible = true;
                    setTimeout(refreshAllCharts, 150);
                }
            }
        }

        function switchMode(m) {
            currentMode = m;
            document.getElementById('tabMode1').classList.toggle('active', m === 1);
            document.getElementById('tabMode2').classList.toggle('active', m === 2);
            document.getElementById('mainPanel').style.display = m === 1 ? 'block' : 'none';
            document.getElementById('rheoPanel').style.display = m === 2 ? 'block' : 'none';
            document.getElementById('mainCharts').style.display = m === 1 ? 'flex' : 'none';
            document.getElementById('rheoCharts').style.display = m === 2 ? 'flex' : 'none';
            chartsVisible = true;
            const c1 = document.getElementById('chartContainer1');
            const c2 = document.getElementById('chartContainer2');
            const cr = document.getElementById('chartContainerRheo');
            if (c1) c1.classList.remove('collapsed');
            if (c2) c2.classList.remove('collapsed');
            if (cr) cr.classList.remove('collapsed');
            // 先销毁所有旧图表，再延迟重绘
            safeDestroy(chartQdh); safeDestroy(chartReMu); safeDestroy(chartRheo);
            setTimeout(() => { refreshAllCharts(); }, 150);
        }

        document.getElementById('tabMode1').addEventListener('click', () => switchMode(1));
        document.getElementById('tabMode2').addEventListener('click', () => switchMode(2));

        // 主模式数据操作
        function updateMainTableUI() {
            const tb = document.getElementById('mainTableBody');
            if (!seqList.length) { tb.innerHTML = '<tr><td colspan="7" class="empty-table">暂无实验数据</td></tr>'; return; }
            let h = '';
            for (let i = 0; i < seqList.length; i++) h += `<tr><td>${seqList[i]}</td><td>${QList[i].toFixed(1)}</td><td>${dhList[i].toFixed(1)}</td><td>${ReList[i].toFixed(2)}</td><td>${QPrimeList[i].toFixed(2)}</td><td>${muList[i].toFixed(4)}</td><td><span class="del-cell" onclick="deleteMainData(${seqList[i]})">✕</span></td></tr>`;
            tb.innerHTML = h;
        }

        function addMainDataSingle(q, dh) { if (dh <= 0) return false; const p = calcAllParam(q, dh); seqList.push(seqList.length + 1); QList.push(q); dhList.push(dh); QPrimeList.push(p.QPrime); muList.push(p.mu); ReList.push(p.Re); return true; }
        function addMainData() {
            const q = +document.getElementById('inputQ').value, dh = +document.getElementById('inputDh').value;
            if (isNaN(q) || isNaN(dh)) { showToast('请输入数值', 'error'); return; }
            if (addMainDataSingle(q, dh)) { updateMainTableUI(); refreshAllCharts(); document.getElementById('inputQ').value = ''; document.getElementById('inputDh').value = ''; showToast('已添加', 'success'); }
        }
        function batchAddMain() {
            const lines = document.getElementById('batchMainInput').value.trim().split(/[\r\n]+/); let c = 0;
            for (const l of lines) { const p = l.trim().split(/\s+/); if (p.length < 2) continue; const q = +p[0], dh = +p[1]; if (isNaN(q) || isNaN(dh) || dh <= 0) continue; if (addMainDataSingle(q, dh)) c++; }
            updateMainTableUI(); refreshAllCharts(); showToast(`批量添加 ${c} 组`, 'success');
        }
        function deleteMainData(seq) { const i = seq - 1; if (i < 0 || i >= seqList.length) return; seqList.splice(i, 1); QList.splice(i, 1); dhList.splice(i, 1); QPrimeList.splice(i, 1); muList.splice(i, 1); ReList.splice(i, 1); for (let j = 0; j < seqList.length; j++) seqList[j] = j + 1; updateMainTableUI(); refreshAllCharts(); }
        function resetMainData() { if (!seqList.length) return; if (confirm('清空全部主模式数据？')) { seqList = []; QList = []; dhList = []; QPrimeList = []; muList = []; ReList = []; updateMainTableUI(); refreshAllCharts(); } }

        // 流变数据操作
        function calcGamma(r) { return +(1.703 * r).toFixed(2); }
        function calcTau(t) { return +(0.511 * t).toFixed(4); }
        function updateRheoTableUI() {
            const tb = document.getElementById('rheoTableBody');
            if (!rpmList.length) { tb.innerHTML = '<tr><td colspan="6" class="empty-table">暂无流变数据</td></tr>'; return; }
            let h = '';
            for (let i = 0; i < rpmList.length; i++) h += `<tr><td>${i + 1}</td><td>${rpmList[i].toFixed(1)}</td><td>${thetaList[i].toFixed(1)}</td><td>${gammaList[i].toFixed(2)}</td><td>${tauList[i].toFixed(4)}</td><td><span class="del-cell" onclick="deleteRheoData(${i + 1})">✕</span></td></tr>`;
            tb.innerHTML = h;
        }
        function addRheoDataSingle(r, th) { if (r <= 0 || th < 0) return false; rpmList.push(r); thetaList.push(th); gammaList.push(calcGamma(r)); tauList.push(calcTau(th)); return true; }
        function addRheoData() {
            const r = +document.getElementById('inputRpm').value, th = +document.getElementById('inputTheta').value;
            if (isNaN(r) || isNaN(th)) { showToast('请输入数值', 'error'); return; }
            if (addRheoDataSingle(r, th)) { updateRheoTableUI(); refreshAllCharts(); document.getElementById('inputRpm').value = ''; document.getElementById('inputTheta').value = ''; showToast('已添加', 'success'); }
        }
        function batchAddRheo() {
            const lines = document.getElementById('batchRheoInput').value.trim().split(/[\r\n]+/); let c = 0;
            for (const l of lines) { const p = l.trim().split(/\s+/); if (p.length < 2) continue; const r = +p[0], th = +p[1]; if (isNaN(r) || isNaN(th) || r <= 0 || th < 0) continue; if (addRheoDataSingle(r, th)) c++; }
            updateRheoTableUI(); refreshAllCharts(); showToast(`批量添加 ${c} 组`, 'success');
        }
        function deleteRheoData(idx) { const i = idx - 1; if (i < 0 || i >= rpmList.length) return; rpmList.splice(i, 1); thetaList.splice(i, 1); gammaList.splice(i, 1); tauList.splice(i, 1); updateRheoTableUI(); refreshAllCharts(); }
        function resetRheoData() { if (!rpmList.length) return; if (confirm('清空全部流变数据？')) { rpmList = []; thetaList = []; gammaList = []; tauList = []; phi3_1min = null; phi3_10min = null; document.getElementById('rheoResultsCard').style.display = 'none'; updateRheoTableUI(); refreshAllCharts(); } }
        function updatePhi3() {
            const v1 = document.getElementById('inputPhi3_1min').value, v10 = document.getElementById('inputPhi3_10min').value;
            phi3_1min = v1 ? +v1 : null; phi3_10min = v10 ? +v10 : null; showToast('静切力已保存', 'success');
        }

        // 导出/导入
        async function downloadBlob(blob, name) {
            if (window.showSaveFilePicker) {
                try { const h = await window.showSaveFilePicker({ suggestedName: name }); const w = await h.createWritable(); await w.write(blob); await w.close(); showToast('文件已保存', 'success'); return; } catch (e) { if (e.name === 'AbortError') return; }
            }
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = name; a.click(); showToast('下载已开始', 'success');
        }

        async function exportMainTable() {
            if (!seqList.length) { showToast('无数据', 'error'); return; }
            const fmt = prompt('请输入导出格式：txt、csv 或 xlsx', 'xlsx'); if (!fmt) return;
            const h = ['次序', 'Q(cm³/s)', 'Δh(cm)', 'Re_el', "Q'(cm³/s)", 'μ'];
            const rows = [h];
            for (let i = 0; i < seqList.length; i++) rows.push([seqList[i], QList[i].toFixed(1), dhList[i].toFixed(1), ReList[i].toFixed(2), QPrimeList[i].toFixed(2), muList[i].toFixed(4)]);
            if (fmt.toLowerCase() === 'txt') downloadBlob(new Blob([rows.map(r => r.join('\t')).join('\n')], { type: 'text/plain' }), '流体实验数据表.txt');
            else if (fmt.toLowerCase() === 'csv') downloadBlob(new Blob([rows.map(r => r.join(',')).join('\n')], { type: 'text/csv' }), '流体实验数据表.csv');
            else if (fmt.toLowerCase() === 'xlsx') {
                const wb = XLSX.utils.book_new(); const ws = XLSX.utils.aoa_to_sheet(rows); XLSX.utils.book_append_sheet(wb, ws, '数据');
                const out = XLSX.write(wb, { bookType: 'xlsx', type: 'array' }); downloadBlob(new Blob([out], { type: 'application/octet-stream' }), '流体实验数据表.xlsx');
            } else showToast('不支持的格式', 'error');
        }

        function triggerImportMain() { document.getElementById('importFileMain').click(); }
        function handleImportMain(e) {
            const f = e.target.files[0]; if (!f) return;
            const reader = new FileReader(); const ext = f.name.split('.').pop().toLowerCase();
            reader.onload = function (ev) {
                let data = [];
                if (ext === 'xlsx') {
                    const wb = XLSX.read(new Uint8Array(ev.target.result), { type: 'array' });
                    const ws = wb.Sheets[wb.SheetNames[0]]; const json = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
                    for (const row of json) { if (row.length < 2) continue; const Q = +row[1], dh = +row[2]; if (isNaN(Q) || isNaN(dh) || dh <= 0) continue; data.push({ Q, dh }); }
                } else {
                    const lines = ev.target.result.split(/[\r\n]+/);
                    for (const line of lines) { const t = line.trim(); if (!t || t.includes('次序')) continue; const p = t.split(/[\t,]+/); if (p.length < 2) continue; const Q = +p[0], dh = +p[1]; if (isNaN(Q) || isNaN(dh) || dh <= 0) continue; data.push({ Q, dh }); }
                }
                if (!data.length) { showToast('无有效数据', 'error'); return; }
                if (confirm(`找到 ${data.length} 组，是否清空现有？`)) { seqList = []; QList = []; dhList = []; QPrimeList = []; muList = []; ReList = []; }
                for (const d of data) addMainDataSingle(d.Q, d.dh);
                updateMainTableUI(); refreshAllCharts(); showToast(`导入 ${data.length} 组`, 'success');
            };
            if (ext === 'xlsx') reader.readAsArrayBuffer(f); else reader.readAsText(f, 'UTF-8');
            e.target.value = '';
        }

        async function exportRheoTable() {
            if (!rpmList.length) return;
            const fmt = prompt('请输入导出格式：txt、csv 或 xlsx', 'xlsx'); if (!fmt) return;
            const h = ['转速(rpm)', '读数(格)', 'γ(s⁻¹)', 'τ(Pa)']; const rows = [h];
            for (let i = 0; i < rpmList.length; i++) rows.push([rpmList[i].toFixed(1), thetaList[i].toFixed(1), gammaList[i].toFixed(2), tauList[i].toFixed(4)]);
            if (fmt.toLowerCase() === 'txt') downloadBlob(new Blob([rows.map(r => r.join('\t')).join('\n')], { type: 'text/plain' }), '流变数据表.txt');
            else if (fmt.toLowerCase() === 'csv') downloadBlob(new Blob([rows.map(r => r.join(',')).join('\n')], { type: 'text/csv' }), '流变数据表.csv');
            else if (fmt.toLowerCase() === 'xlsx') {
                const wb = XLSX.utils.book_new(); const ws = XLSX.utils.aoa_to_sheet(rows); XLSX.utils.book_append_sheet(wb, ws, '流变');
                const out = XLSX.write(wb, { bookType: 'xlsx', type: 'array' }); downloadBlob(new Blob([out], { type: 'application/octet-stream' }), '流变数据表.xlsx');
            } else showToast('不支持的格式', 'error');
        }

        function triggerImportRheo() { document.getElementById('importFileRheo').click(); }
        function handleImportRheo(e) {
            const f = e.target.files[0]; if (!f) return;
            const reader = new FileReader(); const ext = f.name.split('.').pop().toLowerCase();
            reader.onload = function (ev) {
                let data = [];
                if (ext === 'xlsx') {
                    const wb = XLSX.read(new Uint8Array(ev.target.result), { type: 'array' });
                    const ws = wb.Sheets[wb.SheetNames[0]]; const json = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
                    for (const row of json) { if (row.length < 2) continue; const rpm = +row[0], theta = +row[1]; if (isNaN(rpm) || isNaN(theta) || rpm <= 0 || theta < 0) continue; data.push({ rpm, theta }); }
                } else {
                    const lines = ev.target.result.split(/[\r\n]+/);
                    for (const line of lines) { const t = line.trim(); if (!t || t.includes('转速')) continue; const p = t.split(/[\t,]+/); if (p.length < 2) continue; const rpm = +p[0], theta = +p[1]; if (isNaN(rpm) || isNaN(theta) || rpm <= 0 || theta < 0) continue; data.push({ rpm, theta }); }
                }
                if (!data.length) { showToast('无有效数据', 'error'); return; }
                if (confirm(`找到 ${data.length} 组，是否清空现有？`)) { rpmList = []; thetaList = []; gammaList = []; tauList = []; }
                for (const d of data) addRheoDataSingle(d.rpm, d.theta);
                updateRheoTableUI(); refreshAllCharts(); showToast(`导入 ${data.length} 组`, 'success');
            };
            if (ext === 'xlsx') reader.readAsArrayBuffer(f); else reader.readAsText(f, 'UTF-8');
            e.target.value = '';
        }

        // 流变参数计算
        function calcRheoParams() {
            if (!rpmList.length) return;
            let phi600 = null, phi300 = null;
            for (let i = 0; i < rpmList.length; i++) { if (Math.abs(rpmList[i] - 600) < 1e-6) phi600 = thetaList[i]; if (Math.abs(rpmList[i] - 300) < 1e-6) phi300 = thetaList[i]; }
            if (phi600 === null || phi300 === null) {
                document.getElementById('rheoResultsCard').style.display = 'block';
                document.getElementById('rheoResultsGrid').innerHTML = '<p style="color:#e53e3e">⚠️ 缺少600或300 rpm数据</p>';
                return;
            }
            const eta_p = 0.001 * (phi600 - phi300), tau_0 = 0.511 * (2 * phi300 - phi600);
            const tau_s1 = phi3_1min !== null ? 0.511 * phi3_1min : null, tau_s10 = phi3_10min !== null ? 0.511 * phi3_10min : null;
            let n = NaN, Kv = NaN;
            if (phi600 !== phi300 && phi600 > 0 && phi300 > 0) { n = 3.322 * Math.log10(phi600 / phi300); Kv = 0.511 * phi600 / Math.pow(1020, n); }
            let grid = `<div class="result-item"><div class="val">${eta_p.toFixed(4)}</div><div class="lbl">塑性黏度 ηₚ (Pa·s)</div></div>`;
            grid += `<div class="result-item"><div class="val accent">${tau_0.toFixed(4)}</div><div class="lbl">动切应力 τ₀ (Pa)</div></div>`;
            if (tau_s1 !== null) grid += `<div class="result-item"><div class="val">${tau_s1.toFixed(4)}</div><div class="lbl">静切应力(1min)</div></div>`;
            if (tau_s10 !== null) grid += `<div class="result-item"><div class="val">${tau_s10.toFixed(4)}</div><div class="lbl">静切应力(10min)</div></div>`;
            if (!isNaN(n)) { grid += `<div class="result-item"><div class="val">${n.toFixed(4)}</div><div class="lbl">流性指数 n</div></div>`; grid += `<div class="result-item"><div class="val accent">${Kv.toFixed(4)}</div><div class="lbl">稠度系数 K (Pa·sⁿ)</div></div>`; }
            document.getElementById('rheoResultsGrid').innerHTML = grid;
            let typeHTML = '';
            if (!isNaN(n)) {
                let type = '', cls = ''; if (n < 1) { type = '拟塑性流体'; cls = 'pseudoplastic'; } else if (n === 1) { type = '牛顿流体'; cls = 'newtonian'; } else { type = '胀塑性流体'; cls = 'dilatant'; }
                typeHTML += `<p>n = ${n.toFixed(4)} → ${type}</p>`;
                let ov = '', oc = '';
                if (n < 1 && tau_0 > 0) { ov = '带屈服应力的拟塑性流体'; oc = 'pseudoplastic'; }
                else if (n < 1 && tau_0 <= 0) { ov = '拟塑性流体（幂律流体）'; oc = 'pseudoplastic'; }
                else if (n === 1 && tau_0 > 0) { ov = '宾汉塑性流体'; oc = 'bingham'; }
                else if (n === 1 && tau_0 <= 0) { ov = '牛顿流体'; oc = 'newtonian'; }
                else if (n > 1 && tau_0 > 0) { ov = '带屈服应力的胀塑性流体'; oc = 'dilatant'; }
                else { ov = '胀塑性流体'; oc = 'dilatant'; }
                typeHTML += `<span class="fluid-type-badge ${oc}">综合判断：${ov}</span>`;
            } else typeHTML += '<p>因 n 缺失，仅根据 τ₀ 判断：' + (tau_0 > 0 ? '塑性流体范畴' : '幂律流体范畴') + '</p>';
            document.getElementById('fluidTypeResult').innerHTML = typeHTML;
            document.getElementById('rheoResultsCard').style.display = 'block';
        }

        // 图表导出为JPEG
        async function exportChartJPEG(layout = 'sidebyside') {
    if (currentMode === 1 && !seqList.length) { showToast('无数据可导出图表', 'error'); return; }
    if (currentMode === 2 && !gammaList.length) { showToast('无数据可导出图表', 'error'); return; }

    // 强制刷新图表，确保渲染完成
    refreshAllCharts();
    await new Promise(r => setTimeout(r, 200));

    if (currentMode === 1) {
        // 流体力学模式：左右/上下组合
        const c1 = document.getElementById('chartQdh');
        const c2 = document.getElementById('chartReMu');
        if (!c1 || !c2) return;

        let combinedCanvas;
        const padding = 20;

        if (layout === 'sidebyside') {
            const w = c1.width + c2.width + padding;
            const h = Math.max(c1.height, c2.height);
            combinedCanvas = document.createElement('canvas');
            combinedCanvas.width = w;
            combinedCanvas.height = h;
            const ctx = combinedCanvas.getContext('2d');
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, w, h);
            ctx.drawImage(c1, 0, 0);
            ctx.drawImage(c2, c1.width + padding, 0);
        } else { // stacked
            const w = Math.max(c1.width, c2.width);
            const h = c1.height + c2.height + padding;
            combinedCanvas = document.createElement('canvas');
            combinedCanvas.width = w;
            combinedCanvas.height = h;
            const ctx = combinedCanvas.getContext('2d');
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, w, h);
            ctx.drawImage(c1, 0, 0);
            ctx.drawImage(c2, 0, c1.height + padding);
        }

        const blob = await new Promise(r => combinedCanvas.toBlob(r, 'image/jpeg', 0.95));
        const fileName = `流体实验图表_${layout === 'sidebyside' ? '左右' : '上下'}.jpg`;
        downloadBlob(blob, fileName);
    } else {
        // 流变模式：导出单张图表，并强制白色背景
        const canvas = document.getElementById('chartRheo');
        if (!canvas) return;

        // 创建新画布，避免直接导出可能带透明背景
        const exportCanvas = document.createElement('canvas');
        exportCanvas.width = canvas.width;
        exportCanvas.height = canvas.height;
        const ctx = exportCanvas.getContext('2d');
        // 填充白色背景
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, exportCanvas.width, exportCanvas.height);
        // 绘制图表
        ctx.drawImage(canvas, 0, 0);

        const blob = await new Promise(r => exportCanvas.toBlob(r, 'image/jpeg', 0.95));
        downloadBlob(blob, '流变曲线图.jpg');
    }
}

        function scrollToAddForm() { document.getElementById('addDataCard').scrollIntoView({ behavior: 'smooth' }); }
        function scrollToRheoAddForm() { document.getElementById('addRheoDataCard').scrollIntoView({ behavior: 'smooth' }); }

        // 初始化
        window.addEventListener('DOMContentLoaded', () => {
            switchMode(1);
            updateMainTableUI();
            updateRheoTableUI();
        });
    </script>
